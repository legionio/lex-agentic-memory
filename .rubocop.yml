inherit_gem:
  rubocop-legion: config/lex.yml

# Actors use modern Ruby one-liner `def time = N` syntax which this cop does not recognize
Legion/Extension/EveryActorRequiresTime:
  Enabled: false

# Class instance variables are intentional in singleton-pattern helpers
ThreadSafety/ClassInstanceVariable:
  Enabled: false

# Helper classes in this gem use direct Legion::* calls intentionally (no helper mixin included)
Legion/HelperMigration/DirectLogging:
  Enabled: false

Legion/HelperMigration/DirectCache:
  Enabled: false

Legion/HelperMigration/DirectJson:
  Enabled: false

Legion/HelperMigration/DirectData:
  Enabled: false

Legion/HelperMigration/OldLoggingMethods:
  Enabled: false

# ErrorTracer intentionally spawns a single long-lived worker thread for async DB writes
ThreadSafety/NewThread:
  Exclude:
    - 'lib/**/error_tracer.rb'

# ErrorTracer rescue blocks are intentionally silent to never break the logging pipeline
Legion/RescueLogging/NoCapture:
  Exclude:
    - 'lib/**/error_tracer.rb'
